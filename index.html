<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Laura 💛</title>

<style>
body{
    margin:0;
    background:#f5efe6;
    font-family:Arial;
    overflow:hidden;
}

/* inicio */
#start{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    cursor:pointer;
}

#start span{
    font-size:80px;
}

#line{
    border-bottom:2px solid black;
    width:200px;
    margin:10px auto;
}

/* escena */
#scene{
    display:none;
}

/* tronco realista */
#tree{
    position:absolute;
    bottom:0;
    left:70%;
    width:40px;
    height:0;
    background:linear-gradient(to right, #5a3e2b, #8B5A2B, #5a3e2b);
    border-radius:20px;
    transition:2s;
}

/* textura del tronco */
#tree::after{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:repeating-linear-gradient(
        90deg,
        rgba(0,0,0,0.1),
        rgba(0,0,0,0.1) 2px,
        transparent 2px,
        transparent 6px
    );
    border-radius:20px;
}

/* flores */
.flower{
    position:absolute;
    font-size:14px;
}

/* texto */
#text{
    position:absolute;
    left:5%;
    top:30%;
    width:40%;
    font-size:26px;
    line-height:1.5;
    opacity:0;
    transition:2s;
}
</style>
</head>

<body>

<!-- inicio -->
<div id="start" onclick="start()">
    <span>🌻</span>
    <div>Flores para ti</div>
    <div id="line"></div>
</div>

<!-- escena -->
<div id="scene">

<div id="tree"></div>

<div id="text">
Laura eres el amor de mi vida 💛<br><br>
El 20 de Febrero de 2025 me hiciste el chico más feliz del mundo.
</div>

</div>

<script>

function start(){
    document.getElementById("start").style.display="none";
    document.getElementById("scene").style.display="block";

    let tree = document.getElementById("tree");

    // crecer tronco
    tree.style.height="250px";

    setTimeout(createHeart,2500);

    setTimeout(()=>{
        document.getElementById("text").style.opacity=1;
    },4500);
}

/* corazón relleno PERFECTO */
function createHeart(){
    let centerX = window.innerWidth*0.7;
    let centerY = window.innerHeight/2 - 50;

    for(let i=0;i<1200;i++){
        let t = Math.random()*Math.PI*2;
        let r = Math.random();

        let x = 16*Math.pow(Math.sin(t),3);
        let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

        let flower=document.createElement("div");
        flower.className="flower";
        flower.innerHTML="🌼";

        flower.style.left = (centerX + x*9*r)+"px";
        flower.style.top = (centerY + y*9*r)+"px";

        document.body.appendChild(flower);
    }
}

</script>

</body>
</html>
