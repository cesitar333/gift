<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Laura 💛</title>

<style>
body{
    margin:0;
    background:#f5efe6;
    font-family:Arial;
    overflow:hidden;
}

/* inicio */
#start{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    cursor:pointer;
}

#start span{
    font-size:80px;
}

/* escena */
#scene{
    display:none;
}

/* árbol */
#tree{
    position:absolute;
    bottom:0;
    left:65%;
    width:250px;
}

/* animación dibujo */
path{
    stroke:#8B5A2B;
    stroke-width:4;
    fill:none;
    stroke-dasharray:1000;
    stroke-dashoffset:1000;
    animation: draw 3s forwards;
}

@keyframes draw{
    to{stroke-dashoffset:0;}
}

/* flores */
.flower{
    position:absolute;
    font-size:14px;
    opacity:0;
    animation: fadeIn 1s forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

/* texto */
#text{
    position:absolute;
    left:5%;
    top:30%;
    width:40%;
    font-size:26px;
    opacity:0;
    transition:2s;
}
</style>
</head>

<body>

<div id="start" onclick="start()">
    <span>🌻</span>
    <div>Flores para ti</div>
</div>

<div id="scene">

<svg id="tree" viewBox="0 0 200 300">

<!-- tronco -->
<path d="M100 300 C90 250,90 200,100 150 C110 200,110 250,100 300"/>

<!-- ramas -->
<path d="M100 160 C130 140,150 120,160 100"/>
<path d="M100 170 C70 140,50 120,40 100"/>
<path d="M100 130 C120 110,130 90,135 70"/>
<path d="M100 140 C80 110,70 90,65 70"/>
<path d="M100 110 C100 80,105 60,110 40"/>

</svg>

<div id="text">
Laura eres el amor de mi vida 💛<br><br>
El 20 de Febrero de 2025 me hiciste el chico más feliz del mundo.
</div>

</div>

<script>

function start(){
    document.getElementById("start").style.display="none";
    document.getElementById("scene").style.display="block";

    // flores salen después de dibujar
    setTimeout(flowersOnTree,3000);

    // corazón después
    setTimeout(heart,6000);

    // texto final
    setTimeout(()=>{
        document.getElementById("text").style.opacity=1;
    },8000);
}

/* flores en ramas */
function flowersOnTree(){
    let centerX = window.innerWidth*0.65;
    let centerY = window.innerHeight/2;

    for(let i=0;i<150;i++){
        let f=document.createElement("div");
        f.className="flower";
        f.innerHTML="🌼";

        f.style.left = (centerX + (Math.random()*120-60))+"px";
        f.style.top = (centerY - Math.random()*150)+"px";

        document.body.appendChild(f);
    }
}

/* transición a corazón */
function heart(){
    let centerX = window.innerWidth*0.65;
    let centerY = window.innerHeight/2 - 50;

    for(let i=0;i<800;i++){
        let t = Math.random()*Math.PI*2;
        let r = Math.random();

        let x = 16*Math.pow(Math.sin(t),3);
        let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

        let flower=document.createElement("div");
        flower.className="flower";
        flower.innerHTML="🌼";

        flower.style.left = (centerX + x*8*r)+"px";
        flower.style.top = (centerY + y*8*r)+"px";

        document.body.appendChild(flower);
    }
}

</script>

</body>
</html>
