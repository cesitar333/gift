<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Laura 💛</title>

<style>
body{
    margin:0;
    background:#f5efe6;
    font-family:Arial;
    overflow:hidden;
}

/* inicio */
#start{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    cursor:pointer;
}

#start span{
    font-size:80px;
}

/* escena */
#scene{
    display:none;
}

/* árbol (imagen real) */
#tree{
    position:absolute;
    bottom:0;
    left:60%;
    width:300px;
}

/* flores */
.flower{
    position:absolute;
    font-size:14px;
    opacity:0;
    animation: fadeIn 1s forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

/* texto */
#text{
    position:absolute;
    left:5%;
    top:30%;
    width:40%;
    font-size:26px;
    opacity:0;
    transition:2s;
}
</style>
</head>

<body>

<!-- pantalla inicio -->
<div id="start" onclick="start()">
    <span>🌻</span>
    <div>Flores para ti</div>
</div>

<!-- escena -->
<div id="scene">

<!-- AQUÍ ESTÁ EL CAMBIO IMPORTANTE -->
<img id="tree" src="tree.png">

<div id="text">
Laura eres el amor de mi vida 💛<br><br>
El 20 de Febrero de 2025 me hiciste el chico más feliz del mundo.
</div>

</div>

<script>

function start(){
    document.getElementById("start").style.display="none";
    document.getElementById("scene").style.display="block";

    setTimeout(flowers,2000);
    setTimeout(heart,5000);

    setTimeout(()=>{
        document.getElementById("text").style.opacity=1;
    },7000);
}

/* flores en el árbol */
function flowers(){
    let centerX = window.innerWidth*0.65;
    let centerY = window.innerHeight/2;

    for(let i=0;i<200;i++){
        let f=document.createElement("div");
        f.className="flower";
        f.innerHTML="🌼";

        f.style.left = (centerX + (Math.random()*120-60))+"px";
        f.style.top = (centerY - Math.random()*150)+"px";

        document.body.appendChild(f);
    }
}

/* corazón de flores */
function heart(){
    let centerX = window.innerWidth*0.65;
    let centerY = window.innerHeight/2 - 50;

    for(let i=0;i<1000;i++){
        let t = Math.random()*Math.PI*2;
        let r = Math.random();

        let x = 16*Math.pow(Math.sin(t),3);
        let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

        let flower=document.createElement("div");
        flower.className="flower";
        flower.innerHTML="🌼";

        flower.style.left = (centerX + x*8*r)+"px";
        flower.style.top = (centerY + y*8*r)+"px";

        document.body.appendChild(flower);
    }
}

</script>

</body>
</html>
