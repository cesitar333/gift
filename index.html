<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Laura 💛</title>

<style>
body{
    margin:0;
    background:#f5efe6;
    font-family:Arial;
    overflow:hidden;
}

/* inicio */
#start{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    cursor:pointer;
}

#start span{
    font-size:60px;
}

#line{
    border-bottom:2px solid black;
    width:180px;
    margin:10px auto;
}

/* contenedor principal */
#container{
    display:none;
    width:100%;
    height:100vh;
}

/* texto */
#text{
    position:absolute;
    left:5%;
    top:20%;
    width:30%;
    font-size:22px;
    line-height:1.6;
}

/* árbol */
#tree{
    position:absolute;
    bottom:0;
    left:65%;
    transform:translateX(-50%);
    width:40px;
    height:0;
    background:linear-gradient(#8B5A2B, #5a3b1a);
    border-radius:20px;
    transition:3s;
}

/* ramas suaves */
.branch{
    position:absolute;
    width:120px;
    height:6px;
    background:#8B5A2B;
    border-radius:10px;
    transform-origin:left;
}

/* flores corazón */
.flower{
    position:absolute;
    font-size:20px;
    opacity:0;
    animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
    to{opacity:1;}
}

</style>
</head>

<body>

<!-- inicio -->
<div id="start" onclick="start()">
    <span>🌻</span>
    <div>Flores Para Ti</div>
    <div id="line"></div>
</div>

<!-- contenido -->
<div id="container">

    <!-- texto -->
    <div id="text">
        Flores amarillas para el amor de mi vida:<br><br>

        Si pudiera elegir un lugar seguro, sería a tu lado.<br><br>

        Cuanto más tiempo estoy contigo más te amo.<br><br>

        — I Love You 💛<br><br>

        Que el 20 de Febrero de 2025 me hiciste el chico más feliz del mundo,<br><br>
        Laura eres el amor de mi vida.
    </div>

    <!-- árbol -->
    <div id="tree"></div>

</div>

<!-- música -->
<audio id="music" src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav"></audio>

<script>

function start(){
    document.getElementById("start").style.display="none";
    document.getElementById("container").style.display="block";

    let tree = document.getElementById("tree");

    /* crecer árbol */
    tree.style.height="250px";

    setTimeout(()=>{
        createBranches();
    },2000);

    setTimeout(()=>{
        createHeart();
        document.getElementById("music").play();
    },3500);
}

/* ramas */
function createBranches(){
    for(let i=0;i<5;i++){
        let b=document.createElement("div");
        b.className="branch";

        b.style.left="65%";
        b.style.bottom=(200 - i*35)+"px";
        b.style.transform="rotate("+(i%2==0?25:-25)+"deg)";

        document.body.appendChild(b);
    }
}

/* corazón relleno */
function createHeart(){

    let centerX = window.innerWidth * 0.65;
    let centerY = window.innerHeight * 0.35;

    for(let i=0;i<600;i++){

        let t = Math.random()*Math.PI*2;

        let x = 16*Math.pow(Math.sin(t),3);
        let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

        let scale = Math.random()*10;

        let flower=document.createElement("div");
        flower.className="flower";
        flower.innerHTML="🌼";

        flower.style.left = (centerX + x*scale)+"px";
        flower.style.top = (centerY + y*scale)+"px";

        document.body.appendChild(flower);
    }
}

</script>

</body>
</html>
