<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Laura 💛</title>

<style>
body{
    margin:0;
    background:#f5efe6;
    font-family:Arial;
    overflow:hidden;
}

/* inicio */
#start{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    cursor:pointer;
}

#start span{
    font-size:80px;
}

#line{
    border-bottom:2px solid black;
    width:200px;
    margin:10px auto;
}

/* escena */
#scene{
    display:none;
}

/* árbol SVG */
#tree{
    position:absolute;
    bottom:0;
    left:65%;
    width:250px;
}

/* flores */
.flower{
    position:absolute;
    font-size:14px;
}

/* texto */
#text{
    position:absolute;
    left:5%;
    top:30%;
    width:40%;
    font-size:26px;
    line-height:1.5;
    opacity:0;
    transition:2s;
}
</style>
</head>

<body>

<!-- inicio -->
<div id="start" onclick="start()">
    <span>🌻</span>
    <div>Flores para ti</div>
    <div id="line"></div>
</div>

<!-- escena -->
<div id="scene">

<!-- árbol REAL -->
<svg id="tree" viewBox="0 0 200 300">

<!-- tronco -->
<path d="M100 300 
         C90 250, 90 200, 100 150 
         C110 200, 110 250, 100 300" 
      fill="#8B5A2B"/>

<!-- ramas -->
<path d="M100 160 C130 140, 150 120, 160 100" stroke="#8B5A2B" stroke-width="6" fill="none"/>
<path d="M100 170 C70 140, 50 120, 40 100" stroke="#8B5A2B" stroke-width="6" fill="none"/>
<path d="M100 130 C120 110, 130 90, 135 70" stroke="#8B5A2B" stroke-width="5" fill="none"/>
<path d="M100 140 C80 110, 70 90, 65 70" stroke="#8B5A2B" stroke-width="5" fill="none"/>
<path d="M100 110 C100 80, 105 60, 110 40" stroke="#8B5A2B" stroke-width="5" fill="none"/>

</svg>

<!-- texto -->
<div id="text">
Laura eres el amor de mi vida 💛<br><br>
El 20 de Febrero de 2025 me hiciste el chico más feliz del mundo.
</div>

</div>

<script>

function start(){
    document.getElementById("start").style.display="none";
    document.getElementById("scene").style.display="block";

    setTimeout(createHeart,2000);

    setTimeout(()=>{
        document.getElementById("text").style.opacity=1;
    },4000);
}

/* corazón de flores */
function createHeart(){
    let centerX = window.innerWidth*0.65;
    let centerY = window.innerHeight/2 - 50;

    for(let i=0;i<1200;i++){
        let t = Math.random()*Math.PI*2;
        let r = Math.random();

        let x = 16*Math.pow(Math.sin(t),3);
        let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

        let flower=document.createElement("div");
        flower.className="flower";
        flower.innerHTML="🌼";

        flower.style.left = (centerX + x*9*r)+"px";
        flower.style.top = (centerY + y*9*r)+"px";

        document.body.appendChild(flower);
    }
}

</script>

</body>
</html>
