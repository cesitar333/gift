<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Laura 💛</title>

<style>
body{
    margin:0;
    background:#f5efe6;
    font-family:Arial;
    overflow:hidden;
}

/* inicio */
#start{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    cursor:pointer;
}

#start span{
    font-size:80px;
}

#line{
    border-bottom:2px solid black;
    width:200px;
    margin:10px auto;
}

/* contenedor */
#scene{
    display:none;
}

/* árbol */
#tree{
    position:absolute;
    bottom:0;
    left:70%;
    width:20px;
    height:0;
    background:#8B5A2B;
    transition:2s;
}

/* ramas */
.branch{
    position:absolute;
    width:100px;
    height:6px;
    background:#8B5A2B;
    transform-origin:left;
}

/* flores corazón */
.flower{
    position:absolute;
    font-size:14px;
}

/* texto */
#text{
    position:absolute;
    left:5%;
    top:20%;
    width:40%;
    font-size:22px;
    line-height:1.5;
    opacity:0;
    transition:2s;
}
</style>
</head>

<body>

<!-- inicio -->
<div id="start" onclick="start()">
    <span>🌻</span>
    <div>Flores para ti</div>
    <div id="line"></div>
</div>

<!-- escena -->
<div id="scene">

<div id="tree"></div>

<div id="text">
Flores amarillas para el amor de mi vida:<br><br>

Si pudiera elegir un lugar seguro, sería a tu lado.<br><br>

Cuanto más tiempo estoy contigo más te amo.<br><br>

— I Love You 💛<br><br>

Que el 20 de Febrero de 2025 me hiciste el chico más feliz del mundo.<br><br>

Laura eres el amor de mi vida.
</div>

</div>

<script>

function start(){
    document.getElementById("start").style.display="none";
    document.getElementById("scene").style.display="block";

    let tree = document.getElementById("tree");

    // crecer árbol
    tree.style.height="220px";

    setTimeout(createBranches,1500);
    setTimeout(createHeart,3000);
    setTimeout(()=>{
        document.getElementById("text").style.opacity=1;
    },5000);
}

/* ramas */
function createBranches(){
    for(let i=0;i<7;i++){
        let b=document.createElement("div");
        b.className="branch";
        b.style.left="70%";
        b.style.bottom=(150 - i*25)+"px";
        b.style.transform="rotate("+(i%2==0?25:-25)+"deg)";
        document.body.appendChild(b);
    }
}

/* corazón relleno */
function createHeart(){
    let centerX = window.innerWidth*0.7;
    let centerY = window.innerHeight/2 - 50;

    for(let i=0;i<800;i++){
        let t = Math.random()*Math.PI*2;

        let x = 16*Math.pow(Math.sin(t),3);
        let y = -(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

        let scale = Math.random();

        let flower=document.createElement("div");
        flower.className="flower";
        flower.innerHTML="🌼";

        flower.style.left = (centerX + x*8*scale)+"px";
        flower.style.top = (centerY + y*8*scale)+"px";

        document.body.appendChild(flower);
    }
}

</script>

</body>
</html>
